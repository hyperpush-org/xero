app = "xero-cloud"
primary_region = "ord"

[build]
  dockerfile = "cloud/Dockerfile"
  # Build context must be the repo root so the workspace packages
  # (`packages/ui`, `pnpm-workspace.yaml`, root lockfile) are visible to the
  # Docker daemon.
  build-target = ""

[env]
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  PORT = "3000"
  XERO_SERVER_URL = "https://xeroshell.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

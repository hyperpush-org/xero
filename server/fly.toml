app = "xero-server"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  DNS_CLUSTER_QUERY = "xero-server.internal"
  ECTO_IPV6 = "true"
  ERL_AFLAGS = "-proto_dist inet6_tcp"
  PHX_HOST = "xero-server.fly.dev"
  PHX_SERVER = "true"
  PORT = "4000"
  RELEASE_DISTRIBUTION = "name"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "/app/bin/xero eval 'Xero.Release.migrate()'"

services:
  postgres:
    image: postgres:16-alpine
    container_name: xero-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xero_dev
    ports:
      - "5432:5432"
    volumes:
      - xero_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xero_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  xero_postgres_data:

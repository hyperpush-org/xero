app = "xero-landing"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  HOSTNAME = "0.0.0.0"
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

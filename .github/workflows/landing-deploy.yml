name: Web Deploy

on:
  push:
    branches:
      - release

permissions:
  contents: read

concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect deploy changes
    runs-on: ubuntu-latest
    outputs:
      landing: ${{ steps.changes.outputs.landing }}
      cloud: ${{ steps.changes.outputs.cloud }}
      server: ${{ steps.changes.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect affected deploys
        id: changes
        run: |
          set -euo pipefail

          BASE="${{ github.event.before }}"
          HEAD="$GITHUB_SHA"
          LANDING=false
          CLOUD=false
          SERVER=false

          if [ -z "$BASE" ] || [[ "$BASE" =~ ^0+$ ]] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            echo "::notice::Could not determine a reliable deploy diff base; deploying all apps."
            LANDING=true
            CLOUD=true
            SERVER=true
          else
            changed_files="$(git diff --name-only "$BASE" "$HEAD")"
            echo "$changed_files"

            affects() {
              printf '%s\n' "$changed_files" | grep -Eq "$1"
            }

            if affects '^\.github/workflows/landing-deploy\.yml$'; then
              LANDING=true
              CLOUD=true
              SERVER=true
            else
              if affects '^landing/'; then
                LANDING=true
              fi
              if affects '^(cloud/|packages/ui/|pnpm-workspace\.yaml$|pnpm-lock\.yaml$|package\.json$)'; then
                CLOUD=true
              fi
              if affects '^server/'; then
                SERVER=true
              fi
            fi
          fi

          echo "landing=$LANDING" >> "$GITHUB_OUTPUT"
          echo "cloud=$CLOUD" >> "$GITHUB_OUTPUT"
          echo "server=$SERVER" >> "$GITHUB_OUTPUT"

          {
            echo "## Deploy plan"
            echo ""
            echo "- Landing: $LANDING"
            echo "- Cloud: $CLOUD"
            echo "- Server: $SERVER"
          } >> "$GITHUB_STEP_SUMMARY"

  landing:
    name: Deploy landing to Fly.io
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.landing == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: fly-deploy-xero-landing
      cancel-in-progress: false
    defaults:
      run:
        working-directory: landing
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Hydrate latest TUI downloads
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          download_dir="public/downloads/tui/latest"
          rm -rf "$download_dir"
          mkdir -p "$download_dir"

          tag="$(gh release list \
            --repo "$RELEASE_REPO" \
            --limit 1 \
            --json tagName,isDraft \
            --jq 'map(select(.isDraft == false)) | .[0].tagName // ""')"

          if [ -z "$tag" ]; then
            echo "No published release found; deploying landing page without TUI downloads."
            touch "$download_dir/.gitkeep"
            exit 0
          fi

          if ! gh release download "$tag" \
            --repo "$RELEASE_REPO" \
            --pattern 'xero-*' \
            --dir "$download_dir" \
            --clobber; then
            echo "No TUI assets found on $tag; deploying landing page without TUI downloads."
            touch "$download_dir/.gitkeep"
          fi

          version="${tag#v}"
          pub_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          manifest="$(jq -n \
            --arg version "$version" \
            --arg pub_date "$pub_date" \
            '{schema: "xero.tui.update.v1", version: $version, pub_date: $pub_date, assets: {}}')"

          for archive_path in "$download_dir"/xero-*.tar.gz "$download_dir"/xero-*.zip; do
            [ -f "$archive_path" ] || continue
            archive="$(basename "$archive_path")"
            checksum_file="$archive_path.sha256"
            if [ ! -f "$checksum_file" ]; then
              echo "::error::Missing checksum for $archive"
              exit 1
            fi
            target="${archive#xero-}"
            target="${target%.tar.gz}"
            target="${target%.zip}"
            binary="xero"
            if [[ "$archive" == *.zip ]]; then
              binary="xero.exe"
            fi
            sha256="$(awk '{print $1}' "$checksum_file")"
            url="https://xeroshell.com/downloads/tui/latest/$archive"
            manifest="$(jq \
              --arg target "$target" \
              --arg url "$url" \
              --arg sha256 "$sha256" \
              --arg binary "$binary" \
              --arg archive "$archive" \
              '.assets[$target] = {url: $url, sha256: $sha256, binary: $binary, archive: $archive}' \
              <<<"$manifest")"
          done

          printf '%s\n' "$manifest" > "$download_dir/manifest.json"
          jq . "$download_dir/manifest.json"

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_LANDING_TOKEN || secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

  cloud:
    name: Deploy cloud to Fly.io
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.cloud == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: fly-deploy-xero-cloud
      cancel-in-progress: false
    defaults:
      run:
        working-directory: cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure cloud app and domain
        working-directory: .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_CLOUD_TOKEN || secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ vars.FLY_CLOUD_ORG || vars.FLY_ORG }}
        run: |
          set -euo pipefail
          if ! flyctl status --app xero-cloud > /dev/null 2>&1; then
            create_args=(xero-cloud)
            if [ -n "${FLY_ORG:-}" ]; then
              create_args+=(--org "$FLY_ORG")
            fi
            flyctl apps create "${create_args[@]}"
          fi
          flyctl certs show cloud.xeroshell.com --app xero-cloud > /dev/null 2>&1 \
            || flyctl certs create cloud.xeroshell.com --app xero-cloud

      - name: Deploy
        working-directory: .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_CLOUD_TOKEN || secrets.FLY_API_TOKEN }}
        run: flyctl deploy . --remote-only --config cloud/fly.toml --app xero-cloud

  server:
    name: Deploy server to Fly.io
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: fly-deploy-xero-server
      cancel-in-progress: false
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_SERVER_TOKEN || secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

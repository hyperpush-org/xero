name: CI

on:
  push:
    branches:
      - release
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: client
        run: pnpm lint

      - name: Test
        working-directory: client
        run: pnpm test

      - name: Build
        working-directory: client
        run: pnpm build

  landing:
    name: Landing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: landing/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: landing
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: landing
        run: pnpm lint

      - name: Build
        working-directory: landing
        run: pnpm build

  server:
    name: Server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: 26.2.1
          elixir-version: 1.15.7

      - name: Cache Mix
        uses: actions/cache@v5
        with:
          path: |
            server/deps
            server/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('server/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Test
        run: mix test

  tauri-check:
    name: Tauri Rust Check
    runs-on: ubuntu-latest
    env:
      TAURI_CONFIG: '{"bundle":{"resources":[]}}'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libegl-dev \
            libgbm-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            pkg-config \
            librsvg2-dev \
            protobuf-compiler \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Check workspace
        working-directory: client/src-tauri
        run: cargo check --workspace

      - name: Test desktop sidecar IPC contract
        working-directory: client/src-tauri
        run: cargo test --package xero-desktop-control-ipc --lib

      - name: Build desktop sidecar scaffold
        working-directory: client/src-tauri
        run: cargo build --package xero-desktop-sidecar

  windows-dictation-check:
    name: Windows Dictation Rust Check
    runs-on: windows-2025-vs2026
    env:
      TAURI_CONFIG: '{"bundle":{"resources":[]}}'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up protoc
        run: choco install protoc --no-progress -y

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target
          shared-key: windows-dictation

      - name: Check desktop library with Windows dictation backend
        working-directory: client/src-tauri
        run: cargo check --lib

      - name: Compile dictation command contract tests
        working-directory: client/src-tauri
        run: cargo test --lib --no-run

  desktop-sidecar-contract:
    name: Desktop Sidecar Contract (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-15
          - name: windows
            os: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux sidecar dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            libegl-dev \
            libgbm-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            protobuf-compiler \
            pkg-config

      - name: Set up protoc (macOS)
        if: matrix.name == 'macos'
        run: brew install protobuf

      - name: Set up protoc (Windows)
        if: matrix.name == 'windows'
        run: choco install protoc --no-progress -y

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target
          shared-key: desktop-sidecar-${{ matrix.name }}

      - name: Test sidecar IPC contract
        working-directory: client/src-tauri
        run: cargo test --package xero-desktop-control-ipc --lib

      - name: Test desktop sidecar
        working-directory: client/src-tauri
        run: cargo test --package xero-desktop-sidecar

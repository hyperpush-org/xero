<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/icon-logo.svg" />
    <title>Xero</title>
    <script>
      // Apply platform + theme classes before the app mounts so corner clipping
      // and palette are stable from first paint (no flash of default theme).
      ;(() => {
        const platform = navigator.platform.toLowerCase()

        if (platform.includes('mac')) {
          document.documentElement.classList.add('platform-macos')
        } else if (platform.includes('win')) {
          document.documentElement.classList.add('platform-windows')
        } else if (platform.includes('linux')) {
          document.documentElement.classList.add('platform-linux')
        }

        try {
          // Keep this list in sync with any light theme ids in
          // `client/src/features/theme/theme-definitions.ts`. Mismatch only
          // causes a one-frame appearance flicker on cold start, not a bug.
          var LIGHT_THEMES = ['daylight']
          var stored = window.localStorage.getItem('cadence:theme')
          var themeId = stored || 'dusk'
          var appearance = LIGHT_THEMES.indexOf(themeId) >= 0 ? 'light' : 'dark'
          document.documentElement.classList.add('theme-' + themeId)
          document.documentElement.classList.add(appearance)
          document.documentElement.style.colorScheme = appearance
          document.documentElement.dataset.theme = themeId
        } catch (_) {
          document.documentElement.classList.add('theme-dusk', 'dark')
        }
      })()
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--shell-background, #101010);
      }

      html.platform-macos {
        border-radius: 20px;
        clip-path: inset(0 round 20px);
      }

      html.platform-windows {
        border-radius: 8px;
        clip-path: inset(0 round 8px);
      }

      html.platform-macos body,
      html.platform-macos #root {
        border-radius: 20px;
      }

      html.platform-windows body,
      html.platform-windows #root {
        border-radius: 8px;
      }

      /* Window drag regions — must live outside Tailwind/PostCSS to survive the build */
      .titlebar-drag-region {
        -webkit-app-region: drag;
      }
      .titlebar-no-drag {
        -webkit-app-region: no-drag;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

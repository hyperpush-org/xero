<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/icon-logo.svg" />
    <title>Xero</title>
    <script>
      // Apply platform + theme classes before the app mounts so corner clipping
      // and palette are stable from first paint (no flash of default theme).
      ;(() => {
        const platform = navigator.platform.toLowerCase()

        if (platform.includes('mac')) {
          document.documentElement.classList.add('platform-macos')
        } else if (platform.includes('win')) {
          document.documentElement.classList.add('platform-windows')
        } else if (platform.includes('linux')) {
          document.documentElement.classList.add('platform-linux')
        }

        try {
          // Keep this list in sync with any light theme ids in
          // `client/src/features/theme/theme-definitions.ts`. Mismatch only
          // causes a one-frame appearance flicker on cold start, not a bug.
          var LIGHT_THEMES = ['daylight']
          var stored = window.localStorage.getItem('xero:theme')
          var themeId = stored || 'dusk'
          var appearance = LIGHT_THEMES.indexOf(themeId) >= 0 ? 'light' : 'dark'
          document.documentElement.classList.add('theme-' + themeId)
          document.documentElement.classList.add(appearance)
          document.documentElement.style.colorScheme = appearance
          document.documentElement.dataset.theme = themeId
        } catch (_) {
          document.documentElement.classList.add('theme-dusk', 'dark')
        }
      })()
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--shell-background, #101010);
      }

      html.platform-macos {
        border-radius: 20px;
        clip-path: inset(0 round 20px);
      }

      html.platform-windows {
        border-radius: 8px;
        clip-path: inset(0 round 8px);
      }

      html.platform-macos body,
      html.platform-macos #root {
        border-radius: 20px;
      }

      html.platform-windows body,
      html.platform-windows #root {
        border-radius: 8px;
      }

      /* Window drag regions — must live outside Tailwind/PostCSS to survive the build */
      .titlebar-drag-region {
        -webkit-app-region: drag;
      }
      .titlebar-no-drag {
        -webkit-app-region: no-drag;
      }

      /* Boot splash — mirrors <LoadingScreen /> so the JS bundle parse window
       * (between first paint and React mount) shows the same visual. Once React
       * mounts, createRoot replaces #root's children and the React loading
       * screen takes over with effectively no visible transition. Dusk-palette
       * hex fallbacks back up the theme tokens if globals.css loads late. */
      .boot-loading {
        display: flex;
        flex: 1 1 auto;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: var(--background, #121212);
      }
      .boot-loading-mark {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 5rem;
        height: 5rem;
      }
      .boot-loading-ring {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        border: 1px solid
          color-mix(in oklab, var(--primary, #d4a574) 40%, transparent);
        animation: boot-loading-ring 2200ms cubic-bezier(0.2, 0, 0, 1) infinite;
        will-change: transform, opacity;
      }
      .boot-loading-mark img {
        width: 1.75rem;
        height: 1.75rem;
        user-select: none;
        -webkit-user-drag: none;
        animation: boot-loading-breathe 2200ms ease-in-out infinite;
        will-change: opacity;
      }

      @keyframes boot-loading-ring {
        0% {
          transform: scale(0.6);
          opacity: 0;
        }
        25% {
          opacity: 1;
        }
        100% {
          transform: scale(1.5);
          opacity: 0;
        }
      }
      @keyframes boot-loading-breathe {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-loading-ring,
        .boot-loading-mark img {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div
        class="boot-loading"
        role="status"
        aria-live="polite"
        aria-busy="true"
        aria-label="Loading"
      >
        <div class="boot-loading-mark">
          <span class="boot-loading-ring" aria-hidden="true"></span>
          <img src="/icon-logo.svg" alt="" draggable="false" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
